server_ipv4: 0.0.0.0
server_port: 8080
access_log_path: '/var/log/wpwe/access.log'
error_log_path: '/var/log/wpwe/error.log'
methods:
    - HEAD
    - GET
    - OPTIONS
server_name: localhost
webroot: '/app/example_site'
custom_error_pages: false
default_indexes:
    - index.html
error_pages:
    403: docs/403.html
    404: docs/404.html
    405: docs/405.html
    500: docs/500.html
    501: docs/500.html
listen_mode: false
file_ext:
    - html
    - css
    - js
max_workers: 100
health_check_path: /healthz
tls:
    enabled: false
    cert_file: /app/certs/cert.pem
    key_file: /app/certs/key.pem
    port: 8443
http2:
    enabled: true
security_headers:
    enabled: true
